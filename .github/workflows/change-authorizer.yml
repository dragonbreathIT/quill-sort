name: Change Authorizer

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test-and-validate:
    name: Validate Changes
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install project (with fast extras) and tools
        run: |
          pip install .[fast] pytest pytest-cov
          pip install mypy ruff build

      # ---- Linting (style + basic static analysis) ----
      - name: Lint with ruff
        run: |
          ruff check .

      # ---- Type checking ----
      - name: Type check with mypy
        run: |
          mypy quill || true
        # remove "|| true" once your type hints are fully clean

      # ---- Tests ----
      - name: Run tests with coverage
        run: |
          pytest -q --maxfail=1 --disable-warnings --cov=quill --cov-report=term-missing

      # ---- Packaging sanity check ----
      - name: Build package
        run: |
          python -m build

      - name: Check built artifacts with twine (optional)
        run: |
          pip install twine
          twine check dist/*