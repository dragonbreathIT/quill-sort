name: Change Authorizer

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  full-validation:
    name: Full Validation Gauntlet
    runs-on: ubuntu-latest

    env:
      PYTHON_VERSION: "3.13"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install project and tooling
        run: |
          # Install project with fast extras
          pip install .[fast]
          # Core tooling
          pip install pytest pytest-cov mypy ruff build twine

      # ---------- Linting + style ----------
      - name: Lint with ruff (entire repo)
        run: |
          ruff check .

      # ---------- Type checking ----------
      - name: Type check with mypy
        run: |
          # Adjust package/module name as needed
          mypy quill

      # ---------- Unit + integration tests ----------
      - name: Run tests with coverage
        run: |
          # If you have a tests/ folder, this will discover everything
          pytest -q \
            --maxfail=1 \
            --disable-warnings \
            --cov=quill \
            --cov-report=term-missing

      # ---------- Heavy internal test suite (optional but recommended) ----------
      # If you ship a dedicated internal test harness like quill_test_suite.py
      # uncomment and adjust this step.
      #
      # - name: Run Quill internal test suite
      #   run: |
      #     python quill_test_suite.py --fast --bench

      # ---------- Packaging sanity ----------
      - name: Build distribution artifacts
        run: |
          python -m build

      - name: Validate built artifacts with twine
        run: |
          twine check dist/*